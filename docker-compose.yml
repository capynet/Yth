services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
      - ./google-client.json:/app/google-client.json:ro
      - ./youtube_token.json:/app/youtube_token.json
    env_file:
      - .env
    restart: unless-stopped
